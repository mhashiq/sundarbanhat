<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle: brand sand -->
  <circle cx="50" cy="50" r="50" fill="#FAF5EA"/>

  <!-- ══════════════════════════════════════
       MANGROVE TREE ICON (brand green)
       Matches the Sundarban Hat logo mark
       ══════════════════════════════════════ -->

  <!-- Tree trunk -->
  <rect x="47" y="38" width="6" height="22" rx="2" fill="#144A26"/>

  <!-- Main canopy / big round top -->
  <ellipse cx="50" cy="30" rx="18" ry="14" fill="#144A26"/>

  <!-- Left sub-canopy blob -->
  <ellipse cx="34" cy="35" rx="10" ry="8" fill="#144A26"/>

  <!-- Right sub-canopy blob -->
  <ellipse cx="66" cy="35" rx="10" ry="8" fill="#144A26"/>

  <!-- Inner lighter highlight to give depth (slightly lighter green) -->
  <ellipse cx="50" cy="28" rx="12" ry="9" fill="#1a5e30"/>

  <!-- Tiger face hint — two small ear-triangles inside canopy -->
  <polygon points="44,22 47,16 50,22" fill="#144A26"/>
  <polygon points="50,22 53,16 56,22" fill="#144A26"/>

  <!-- ══ ROOTS ══ -->
  <!-- Centre root going straight down -->
  <path d="M50 60 Q50 70 50 76" stroke="#144A26" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Left root arching out -->
  <path d="M48 62 Q40 68 34 74" stroke="#144A26" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M46 64 Q35 70 28 78" stroke="#144A26" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Right root arching out -->
  <path d="M52 62 Q60 68 66 74" stroke="#144A26" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M54 64 Q65 70 72 78" stroke="#144A26" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Horizontal ground line -->
  <line x1="24" y1="78" x2="76" y2="78" stroke="#144A26" stroke-width="2.5" stroke-linecap="round"/>
</svg>